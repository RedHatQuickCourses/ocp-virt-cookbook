apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: fedora-sriov-vm
  namespace: sriov-demo
  labels:
    app: fedora-sriov-vm
spec:
  runStrategy: Always
  instancetype:
    name: u1.medium
  preference:
    name: fedora
  dataVolumeTemplates:
  - metadata:
      name: fedora-sriov-volume
    spec:
      pvc:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 33Gi
      sourceRef:
        kind: DataSource
        name: fedora
        namespace: openshift-virtualization-os-images
  template:
    metadata:
      labels:
        app: fedora-sriov-vm
    spec:
      domain:
        devices:
          interfaces:
          - name: default
            masquerade: {}
          - name: data-plane
            sriov: {}
          - name: mgmt-plane
            sriov: {}
      networks:
      - name: default
        pod: {}
      - name: data-plane
        multus:
          networkName: sriov-net-data
      - name: mgmt-plane
        multus:
          networkName: sriov-net-mgmt
      volumes:
      - name: datavolumedisk
        dataVolume:
          name: fedora-sriov-volume
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            user: fedora
            password: fedora
            chpasswd: { expire: False }
