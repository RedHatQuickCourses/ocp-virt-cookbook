apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: dualstack-udn-vm
  namespace: dualstack-demo
spec:
  runStrategy: Always
  instancetype:
    name: u1.medium
  preference:
    name: fedora
  template:
    metadata:
      labels:
        app: dualstack-udn-vm
    spec:
      domain:
        devices:
          interfaces:
            - name: primary-udn
              binding:
                name: l2bridge
      networks:
        - name: primary-udn
          pod: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:40
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              password: changeme
              chpasswd:
                expire: false
