apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: db-vm
  namespace: netpol-demo
  labels:
    app: database
    role: backend
spec:
  runStrategy: Always
  instancetype:
    name: u1.medium
  preference:
    name: fedora
  template:
    metadata:
      labels:
        app: database
        role: backend
    spec:
      domain:
        devices: {}
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:40
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              password: changeme
              chpasswd:
                expire: false
              packages:
                - nmap-ncat
              runcmd:
                - ncat -l -k -p 5432 -e /usr/bin/echo &
