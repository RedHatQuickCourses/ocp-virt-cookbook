apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: monitoring-test-vm
  namespace: vm-monitoring-demo
  labels:
    app: monitoring-demo
spec:
  runStrategy: Always
  instancetype:
    name: u1.medium
  preference:
    name: fedora
  template:
    spec:
      domain:
        devices: {}
      volumes:
      - name: rootdisk
        containerDisk:
          image: quay.io/containerdisks/fedora:latest
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            password: redhat
            chpasswd:
              expire: false
            packages:
            - qemu-guest-agent
            runcmd:
            - systemctl enable --now qemu-guest-agent