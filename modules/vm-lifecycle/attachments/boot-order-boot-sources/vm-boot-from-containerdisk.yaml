apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-boot-containerdisk
  namespace: boot-demo
spec:
  runStrategy: RerunOnFailure
  instancetype:
    name: u1.medium
  preference:
    name: fedora
  template:
    spec:
      domain:
        devices:
          disks:
            - disk: {}
              name: containerdisk
              bootOrder: 1
            - disk: {}
              name: cloudinitdisk
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/containerdisks/fedora:latest
        - cloudInitNoCloud:
            userData: |-
              #cloud-config
              user: fedora
              password: fedora123
              chpasswd: { expire: False }
              ssh_pwauth: True
          name: cloudinitdisk
