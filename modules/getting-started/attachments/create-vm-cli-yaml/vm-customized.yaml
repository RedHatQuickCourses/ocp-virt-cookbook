apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-customized
  namespace: demo
spec:
  runStrategy: Always
  instancetype:
    name: u1.medium
  preference:
    name: fedora
  template:
    spec:
      domain:
        devices: {}
      volumes:
        - name: rootdisk
          dataVolume:
            name: vm-customized
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              ssh_pwauth: true
              users:
                - name: fedora
                  lock_passwd: false
                  plain_text_passwd: s3cur3p4ss
                  ssh_authorized_keys:
                    - 'ssh-ed25519 AAAA...your-public-key... user@workstation'
                - name: admin
                  groups: wheel
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  ssh_authorized_keys:
                    - 'ssh-ed25519 AAAA...your-public-key... user@workstation'
              packages:
                - vim
                - git
                - tmux
                - htop
              write_files:
                - path: /etc/motd
                  content: |
                    Welcome to your customized VM!
                    Created via YAML manifest and oc apply.
                  permissions: '0644'
              runcmd:
                - systemctl enable --now cockpit.socket
                - echo "VM initialization complete at $(date)" > /var/log/vm-init.log
  dataVolumeTemplates:
    - metadata:
        name: vm-customized
      spec:
        sourceRef:
          kind: DataSource
          name: fedora
          namespace: openshift-virtualization-os-images
        storage:
          resources:
            requests:
              storage: 50Gi