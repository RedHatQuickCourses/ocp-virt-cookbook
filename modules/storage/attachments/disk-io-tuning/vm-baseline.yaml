apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-baseline
  namespace: disk-io-tuning
spec:
  runStrategy: Always
  instancetype:
    name: u1.medium
  preference:
    name: fedora
  template:
    spec:
      domain:
        devices:
          disks:
          - name: rootdisk
            disk: {}
            bootOrder: 1
          - name: cloudinitdisk
            disk: {}
      volumes:
      - name: rootdisk
        dataVolume:
          name: baseline-rootdisk
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            password: redhat
            chpasswd:
              expire: false
            packages:
            - fio
  dataVolumeTemplates:
  - metadata:
      name: baseline-rootdisk
    spec:
      pvc:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 30Gi
      source:
        registry:
          pullMethod: node
          url: docker://quay.io/containerdisks/fedora:latest
