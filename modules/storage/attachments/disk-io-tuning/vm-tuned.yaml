apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-tuned
  namespace: disk-io-tuning
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm-tuned
    spec:
      domain:
        ioThreadsPolicy: auto
        cpu:
          cores: 2
        memory:
          guest: 2Gi
        devices:
          blockMultiQueue: true
          disks:
          - name: rootdisk
            disk:
              bus: virtio
            bootOrder: 1
            cache: none
            io: native
            dedicatedIOThread: true
          - name: cloudinitdisk
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}
        resources:
          requests:
            memory: 2Gi
      networks:
      - name: default
        pod: {}
      volumes:
      - name: rootdisk
        dataVolume:
          name: tuned-rootdisk
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #cloud-config
            password: redhat
            chpasswd:
              expire: false
            packages:
            - fio
  dataVolumeTemplates:
  - metadata:
      name: tuned-rootdisk
    spec:
      pvc:
        accessModes:
        - ReadWriteOnce
        volumeMode: Block
        resources:
          requests:
            storage: 30Gi
      source:
        registry:
          pullMethod: node
          url: docker://quay.io/containerdisks/fedora:latest
