version: "1.0"

content-rules:
  no-emojis: true
  no-bash-loops-in-tutorials: true
  required-tutorial-sections:
    - "Prerequisites"
    - "Summary"

build-gates:
  pre-commit:
    - "npm run build"

git-policy:
  allow-push: false
  allow-pr-creation: false
  allow-remote-comments: false
  require-co-authored-by: "cursor[bot] <206951365+cursor[bot]@users.noreply.github.com>"
  protected-branches:
    - "main"

context-exclusions:
  - "**/kubeconfig"
  - "**/kubeconfig.*"
  - "**/.env"
  - "**/.env.*"
  - "**/secrets/**"
  - "**/*.pem"
  - "**/*.key"

allowed-commands:
  always: [npm, node, git, rg]
  with-cluster: [oc, ansible-playbook, ansible-galaxy]
  with-github: [gh]
